<!DOCTYPE html>

<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Around The Bend｜夕方受取予約</title>

  <style>

    body {

      margin: 0;

      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;

      background: #fffaf2;

      color: #2f1f16;

    }

    .page {

      max-width: 720px;

      margin: 0 auto;

      padding: 34px 18px 48px;

      text-align: center;

    }

    .logo {

      font-family: "Brush Script MT", cursive;

      font-size: 52px;

      font-weight: 700;

      color: #111;

      margin-bottom: 22px;

      line-height: 1.1;

    }

    .line {

      height: 1px;

      background: #c8a978;

      margin: 0 auto 28px;

      width: 82%;

    }

    h1 {

      font-size: 38px;

      letter-spacing: 0.12em;

      margin: 0 0 12px;

      color: #351f12;

    }

    .thanks {

      font-size: 20px;

      margin-bottom: 24px;

    }

    .notice {

      background: #f3e8da;

      border-radius: 18px;

      padding: 22px 14px;

      font-size: 21px;

      line-height: 1.7;

      margin-bottom: 24px;

    }

    .btn {

      width: 100%;

      border: none;

      border-radius: 16px;

      padding: 22px 16px;

      font-size: 26px;

      font-weight: bold;

      cursor: pointer;

      margin: 14px 0;

      box-sizing: border-box;

    }

    .copy-btn {

      background: linear-gradient(90deg, #b48a66, #c9a27f);

      color: #fff;

      box-shadow: 0 6px 14px rgba(90, 56, 34, 0.18);

    }

    .line-btn {

      background: #fff;

      color: #1c7f2e;

      border: 3px solid #2ba54a;

      display: flex;

      align-items: center;

      justify-content: center;

      gap: 16px;

      text-decoration: none;

    }

    .line-icon {

      width: 54px;

      height: 54px;

      border-radius: 12px;

    }

    .message {

      display: none;

      background: #fff2cc;

      color: #6b4a1f;

      border: 1px solid #e5c878;

      border-radius: 12px;

      padding: 14px;

      margin: 16px 0;

      font-size: 18px;

      font-weight: bold;

    }

    .dash {

      border-top: 2px dashed #d0b38c;

      margin: 30px 0 20px;

    }

    .subtext {

      font-size: 18px;

      line-height: 1.7;

      margin-bottom: 22px;

    }

    .template-title {

      display: inline-block;

      background: #eadcca;

      border-radius: 16px;

      padding: 10px 28px;

      font-size: 20px;

      font-weight: bold;

      margin-bottom: -12px;

      position: relative;

      z-index: 2;

    }

    .template-box {

      text-align: left;

      background: #fffdf8;

      border: 2px solid #e4d1b8;

      border-radius: 18px;

      padding: 28px 24px;

      font-size: 20px;

      line-height: 1.65;

      white-space: pre-wrap;

      min-height: 300px;

    }

    .footer {

      margin-top: 34px;

      font-size: 15px;

      color: #6f5a46;

    }

    @media (max-width: 520px) {

      .logo {

        font-size: 38px;

      }

      h1 {

        font-size: 30px;

      }

      .notice {

        font-size: 18px;

      }

      .btn {

        font-size: 21px;

        padding: 19px 12px;

      }

      .line-icon {

        width: 44px;

        height: 44px;

      }

      .template-box {

        font-size: 18px;

        padding: 24px 18px;

      }

    }

  </style>

</head>

<body>

  <main class="page">

    <div class="logo">Around The Bend</div>

    <div class="line"></div>

    <h1>夕方受取予約</h1>

    <div class="thanks">ご予約ありがとうございます。</div>

    <div class="notice">

      予約テンプレートをコピーして、<br>

      LINEトークへ貼り付けて送信してください。

    </div>

    <button class="btn copy-btn" onclick="copyTemplate()">

      📋 予約テンプレートをコピー

    </button>

    <div id="message" class="message">

      コピーしました！LINEトークへ貼り付けて送信してください。

    </div>

    <a class="btn line-btn" href="https://lin.ee/vqrp0bg" target="_blank">

      <img class="line-icon" src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE">

      LINEトークを開く

    </a>

    <div class="dash"></div>

    <div class="subtext">

      コピーできない場合は、<br>

      下のテンプレートを長押ししてコピーしてください。

    </div>

    <div class="template-title">🌿 予約テンプレート 🌿</div>

    <div id="template" class="template-box">受取日：

受取時間：

お名前：

電話番号：

【ご注文】

プレーン　　　　　個

ダブルチョコ　　　個

クランベリーチーズ　　個

枝豆チーズ　　　　個

塩バター　　　　　個

塩バターコーン　　個</div>

    <div class="footer">

      Around The Bend

    </div>

  </main>

  <script>

    function copyTemplate() {

      const text = document.getElementById("template").innerText;

      navigator.clipboard.writeText(text).then(function () {

        const message = document.getElementById("message");

        message.style.display = "block";

      }).catch(function () {

        alert("コピーできませんでした。下のテンプレートを長押ししてコピーしてください。");
      });

    }

  </script>

</body>

</html
